apiVersion: 1

contactPoints:
  - orgId: 1
    name: slack-alerts
    receivers:
      - uid: slack-receiver
        type: slack
        settings:
          url: "${SLACK_WEBHOOK_URL}"
          title: "POC Dashboard Alert"
          text: "{{ len .Alerts.Firing }} alert(s) firing"

  - orgId: 1
    name: teams-alerts
    receivers:
      - uid: teams-receiver
        type: teams
        settings:
          url: "${TEAMS_WEBHOOK_URL}"

policies:
  - orgId: 1
    receiver: slack-alerts
    group_by: ["alertname"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: teams-alerts
        matchers:
          - severity = critical

rules:
  - orgId: 1
    name: poc-alert-rules
    folder: POC Alerts
    interval: 1m
    rules:
      - uid: drift-alert
        title: Model Drift High
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-ds
            model:
              expr: max(phoenix_model_drift_score) by (model_name)
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { type: gt, params: [0.05] }
                  query: { params: [A] }
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Model drift exceeded 5%"

      - uid: error-rate-alert
        title: Error Rate High
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-ds
            model:
              expr: azure_error_rate_percent
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { type: gt, params: [1] }
                  query: { params: [A] }
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Error rate exceeded 1%"

      - uid: workflow-failure-alert
        title: Workflow Failure Rate High
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-ds
            model:
              expr: sum(rate(temporal_workflow_failed_total[5m])) / sum(rate(temporal_workflow_completed_total[5m])) * 100
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { type: gt, params: [10] }
                  query: { params: [A] }
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Workflow failure rate exceeded 10%"

      - uid: cpu-alert
        title: CPU Usage High
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus-ds
            model:
              expr: azure_cpu_usage_percent
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { type: gt, params: [85] }
                  query: { params: [A] }
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "CPU usage exceeded 85%"
