global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: temporal_metrics
    static_configs:
      - targets:
          - host.containers.internal:8080
    metrics_path: /metrics

  - job_name: app_metrics
    static_configs:
      - targets:
          - app:8001
    metrics_path: /metrics
