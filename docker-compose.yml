version: "3.9"

# ── Cloud datasources ─────────────────────────────────────────────────────────
# Phoenix  → https://zaf-phoenix.bravesky-d9f9eeb7.eastus2.azurecontainerapps.io
# Temporal → https://temporal-ui.bravesky-d9f9eeb7.eastus2.azurecontainerapps.io
# No local phoenix / phoenix-db containers needed.

services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: unified_dash-app
    ports:
      - "8000:8000"   # FastAPI REST
      - "8001:8001"   # Prometheus /metrics bridge
    environment:
      - PHOENIX_BASE_URL=${PHOENIX_BASE_URL}
      - PHOENIX_OTLP_ENDPOINT=${PHOENIX_OTLP_ENDPOINT}
      - PHOENIX_API_KEY=${PHOENIX_API_KEY}
      - TEMPORAL_BASE_URL=${TEMPORAL_BASE_URL}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-zenarc}
      - TEMPORAL_API_KEY=${TEMPORAL_API_KEY:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - AZURE_SUBSCRIPTION_ID=${AZURE_SUBSCRIPTION_ID:-}
      - AZURE_RESOURCE_GROUP=${AZURE_RESOURCE_GROUP:-Zenlabs-Agent-Foundry}
      - AZURE_TOKEN_FILE=/tmp/az_token_cache
      - METRICS_PORT=8001
    volumes:
      - /tmp/az_token_cache:/tmp/az_token_cache:ro
    networks:
      - poc-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./app/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - poc-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
      - GF_UNIFIED_ALERTING_ENABLED=true
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./app/config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - poc-network
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  poc-network:
    driver: bridge

volumes:
  grafana_data:
  prometheus_data:
