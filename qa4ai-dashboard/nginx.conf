server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api → Grafana (replaces the Vite dev-server proxy)
    location /api/ {
        proxy_pass https://unified-dash-grafana.bravesky-d9f9eeb7.eastus2.azurecontainerapps.io/api/;
        proxy_http_version 1.1;
        proxy_set_header Host unified-dash-grafana.bravesky-d9f9eeb7.eastus2.azurecontainerapps.io;
        proxy_set_header Authorization "Basic YWRtaW46WmVuTGFic0AyMDI1IQ==";
        proxy_set_header Connection "";
        proxy_set_header Upgrade "";
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
