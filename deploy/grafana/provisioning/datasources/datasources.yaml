apiVersion: 1

datasources:
  # ── Primary: Prometheus (ACA internal) ──────────────────────────────────────
  - name: Prometheus
    uid: prometheus-ds
    type: prometheus
    access: proxy
    url: https://unified-dash-prometheus.internal.bravesky-d9f9eeb7.eastus2.azurecontainerapps.io
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: POST
      tlsSkipVerify: true

  # ── Phoenix Cloud (Infinity — direct REST queries to cloud Phoenix) ───────────
  - name: Phoenix
    uid: phoenix-ds
    type: yesoreyeram-infinity-datasource
    access: proxy
    editable: false
    jsonData:
      baseURL: https://zaf-phoenix.bravesky-d9f9eeb7.eastus2.azurecontainerapps.io
      allowedHosts:
        - https://zaf-phoenix.bravesky-d9f9eeb7.eastus2.azurecontainerapps.io
      auth_type: bearer_token
      tlsSkipVerify: false
    secureJsonData:
      bearerToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJBcGlLZXk6MSJ9.PW-Dq35UwThFYSElOJnJuz7tG6Ta709yQpOJOrp0MTA

  # ── Temporal Cloud (Infinity — direct REST queries to Temporal UI API) ───────
  - name: Temporal
    uid: temporal-ds
    type: yesoreyeram-infinity-datasource
    access: proxy
    editable: false
    jsonData:
      baseURL: https://temporal-ui.bravesky-d9f9eeb7.eastus2.azurecontainerapps.io
      allowedHosts:
        - https://temporal-ui.bravesky-d9f9eeb7.eastus2.azurecontainerapps.io

  # ── Azure Monitor (Container Apps, ACA env, OpenAI metrics) ─────────────────
  - name: AzureMonitor
    uid: azure-monitor-ds
    type: grafana-azure-monitor-datasource
    access: proxy
    editable: true
    jsonData:
      cloudName: azuremonitor
      azureAuthType: msi
      subscriptionId: "bc978289-ba91-4be9-8eee-82dc18f9cde9"

